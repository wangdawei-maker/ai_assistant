<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>AI智能助手</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🤖 AI智能助手</h1>
            <p class="subtitle">LLM + RAG + Agent = 全能助手</p>
        </header>
        
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="content">你好！我是你的AI助手。我能：</div>
                    <div class="content">💬 普通聊天</div>
                    <div class="content">📚 回答文档问题（RAG）</div>
                    <div class="content">🔧 调用工具（时间、计算、天气）</div>
                    <div class="content">📊 表格可视化（输入：表格: 画一下销售额趋势）</div>
                    <div class="content">有什么可以帮你的？</div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="upload-bar">
                    <label class="upload-label">
                        选择表格文件：
                        <input type="file" id="tableFile" accept=".csv,.xlsx,.xls" />
                    </label>
                    <span id="uploadStatus" class="upload-status"></span>
                </div>
                <div class="rag-mode-bar">
                    <label for="ragMode">文档问答模式：</label>
                    <select id="ragMode" title="仅影响涉及文档/政策等问题的回答方式">
                        <option value="basic">基础 RAG</option>
                        <option value="advanced">高级 RAG（混合检索+重排序）</option>
                    </select>
                </div>
                <div class="input-row">
                    <textarea 
                        id="userInput" 
                        placeholder="输入你的问题..."
                        rows="1"
                    ></textarea>
                    <button id="sendBtn">
                        <span>发送</span>
                    </button>
                </div>
            </div>
            
            <div class="tool-status" id="toolStatus"></div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</body>
</html>
